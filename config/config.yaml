camera_subscriber:
  ros__parameters:
    # Color image topic
    color_image_topic: /color/image_raw

    # Color camera info topic
    color_info_topic: /color/camera_info

    # Aligned depth image topic
    aligned_depth_image_topic: /aligned_depth_to_color/image_raw

    # Aligned depth camera info topic
    aligned_depth_info_topic: /aligned_depth_to_color/camera_info

    # Subscription queue size
    queue_size: 2

    # Save received images for debug verification
    save_debug_images: true
    save_dir: ./
    save_once: true
    save_depth_preview: true

    # Grasp pose estimation runs on demand through a service, not per frame.
    enable_grasp_pose: true
    # Load SAM3 ONNX models once during node startup. If false, first service
    # call lazily loads them once and later calls reuse the same sessions.
    preload_grasp_estimator: true
    grasp_pose_service: /estimate_grasp_pose
    publish_grasp_result: false
    save_grasp_debug_image: true
    grasp_debug_image_name: grasp_pose_overlay.png
    grasp_pose_topic: /grasp/pose
    grasp_width_topic: /grasp/width
    grasp_debug_image_topic: /grasp/debug_image
    segmented_cloud_stride: 2
    background_mask_dilation_px: 5
    # Remove the target object's padded 3D volume from background_cloud so
    # MoveIt OctoMap does not duplicate the grasped object as environment.
    background_object_bbox_filter: true
    background_object_bbox_padding_xy: 0.06
    background_object_bbox_padding_z: 0.02
    min_object_dimension: 0.01
    grasp_frame_id: ''

    # Empty sam3_model_dir resolves to share/grasp_vision_pkg/models/sam3.
    sam3_model_dir: ''
    sam3_prompt_type: text
    sam3_prompt: banana
    sam3_box_prompt: [0.0, 0.0, 0.0, 0.0]
    sam3_provider: CUDAExecutionProvider,CPUExecutionProvider
    sam3_input_width: 1008
    sam3_input_height: 1008
    # Run one dummy inference during model initialization to hide first-call latency.
    sam3_warmup: true
    sam3_score_threshold: 0.0

    # GraspPoseEstimator parameters
    depth_scale: 0.001
    float_depth_scale: 1.0
    min_depth: 0.05
    max_depth: 3.0
    min_points: 80
    max_points: 20000
    outlier_percentile: 95.0
    grasp_width_margin: 0.02
